<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超讚RJPQ小工具</title>
    <style>
        /* 基礎樣式優化：減少 padding 增加可用空間 */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a21; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; font-size: 1rem; }
        .container { background: #2d2d37; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; }
        h2 { margin: 0; color: #fff; font-size: 1.4rem; }
        .hint-text { font-size: 0.7rem; color: #888; margin-bottom: 8px; }
        
        #startView, #createView, #joinView, #nicknameView { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 350px; }
        
        /* 左右排版優化：縮小 gap */
        #mainGameView { display: flex; flex-direction: row; gap: 12px; align-items: flex-start; }

        /* 左側主要控制區：縮減至 410px */
        .game-main-content { display: flex; flex-direction: column; align-items: center; width: 410px; }

        input { width: 90%; padding: 8px; border-radius: 8px; border: 1px solid #444; background: #1a1a21; color: #fff; font-size: 1.1rem; }
        button { border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        .primary-btn { background: #007bff; color: white; width: 100%; padding: 10px; font-size: 1.1rem; }
        .secondary-btn { background: #444; color: white; padding: 5px 8px; font-size: 0.8rem; }
        .exit-btn { background: #6c757d; color: white; padding: 5px 8px; font-size: 0.8rem; }
        
        /* 推廣按鈕：縮小最小寬度 */
        .promo-btn { color: white; padding: 6px 0; font-size: 0.85rem; text-decoration: none; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; min-width: 110px; }
        .yt-btn { background: #ff0000; }
        .tw-btn { background: #9146ff; } 

        .header-info { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 5px; }
        .room-code { font-size: 1rem; }
        .room-code span { color: #f1c40f; font-weight: bold; }
        .credit-info { font-size: 0.8rem; color: #aaa; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; border: 1px solid #444; text-align: center; flex-grow: 1; }
        .action-group { display: flex; gap: 4px; }

        /* 右側在線名單：縮減寬度至 160px */
        .user-list-sidebar { 
            width: 160px; 
            background: rgba(0,0,0,0.3); 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .user-list-title { font-size: 0.85rem; font-weight: bold; color: #aaa; margin-bottom: 8px; border-bottom: 1px solid #555; padding-bottom: 4px; text-align: center; }
        #userList { display: flex; flex-direction: column; gap: 6px; }
        .user-badge { font-size: 0.8rem; padding: 5px; border-radius: 6px; color: #fff; font-weight: bold; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 選色區緊湊化 */
        .picker-bar { width: 100%; display: flex; gap: 8px; justify-content: center; align-items: center; background: #1a1a21; padding: 8px; border-radius: 10px; margin-bottom: 8px; box-sizing: border-box; }
        #colorPicker { width: 35px; height: 35px; border: none; background: none; cursor: pointer; padding: 0; }
        .status-tag { font-size: 0.8rem; padding: 3px 6px; border-radius: 5px; background: #444; }

        /* 格子調整：縮小間距與高度 */
        table { width: 100%; border-spacing: 2px; table-layout: fixed; }
        .floor-label { width: 35px; text-align: center; font-weight: bold; font-size: 0.9rem; color: #888; }
        .p-btn { width: 100%; height: 38px; background: #3c3c46; border: none; border-radius: 6px; color: #fff !important; font-weight: bold; cursor: pointer; font-size: 1.2rem; position: relative; overflow: hidden; }
        .user-tag { position: absolute; bottom: 1px; right: 1px; background: rgba(0, 0, 0, 0.7); color: white; font-size: 0.55rem; padding: 0px 2px; border-radius: 2px; pointer-events: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>超讚RJPQ小工具</h2>
    <div class="hint-text">快捷鍵：按數字鍵 1-4 由下往上自動填色</div>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="password" id="createPwd" placeholder="設定 4 碼密碼" maxlength="4">
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>
    <div id="joinView" class="hidden">
        <input type="text" id="joinId" placeholder="房間號碼">
        <input type="password" id="joinPwd" placeholder="密碼">
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>
    <div id="nicknameView" class="hidden">
        <p>房間：<span id="roomIdDisplay" style="color:#f1c40f">------</span></p>
        <input type="text" id="nicknameInput" placeholder="暱稱" maxlength="6">
        <button class="primary-btn" onclick="setNickname()">開始同步</button>
        <button class="secondary-btn" onclick="leaveRoom()">取消</button>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="game-main-content">
            <div class="header-info">
                <div class="info-row">
                    <div class="room-code">房號：<span id="activeRoomId">------</span></div>
                    <a href="https://www.youtube.com/@yulihong22" target="_blank" class="promo-btn yt-btn">咪咪蛋YT</a>
                    <a href="https://www.twitch.tv/yulihong22" target="_blank" class="promo-btn tw-btn">咪咪蛋Twitch</a>
                </div>
                <div class="info-row">
                    <div class="credit-info">MMDxD | 咖塔</div>
                    <div class="action-group">
                        <button class="secondary-btn" style="background:#28a745;" onclick="copyShareLink()">分享</button>
                        <button class="secondary-btn" onclick="clearAllPlatforms()">清空</button>
                        <button class="exit-btn" onclick="leaveRoom()">離開</button>
                    </div>
                </div>
            </div>

            <div class="picker-bar">
                <span>選色：</span>
                <input type="color" id="colorPicker" value="#00EC00">
                <button id="confirmColorBtn" class="secondary-btn" style="background:#007bff;" onclick="pickCustomColor()">確認</button>
                <button id="resetColorBtn" class="hidden secondary-btn" onclick="resetMyColor()">重選</button>
                <div id="myColorStatus" class="hidden status-tag">已鎖定</div>
            </div>

            <table>
                <tbody id="gridBody"></tbody>
            </table>
        </div>

        <div class="user-list-sidebar">
            <div class="user-list-title">在線隊員</div>
            <div id="userList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="app.js?v=20260321_compact"></script>
</body>
</html>
