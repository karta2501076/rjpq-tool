<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅茱助手：真・多人同步</title>
    <style>
        /* 基礎暗色風格 (UI 放大至 1.2 倍) */
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a21; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 0; overflow: hidden; font-size: 1.2rem; }
        .container { background: #2d2d37; padding: 20px; border-radius: 18px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; }
        h2 { margin: 0 0 15px 0; color: #fff; font-size: 1.6rem; }
        
        /* 視圖容器 */
        #startView, #createView, #joinView, #nicknameView { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        #mainGameView { width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* 輸入框與大按鈕 */
        input { width: 90%; padding: 10px; border-radius: 10px; border: 1px solid #444; background: #1a1a21; color: #fff; font-size: 1.2rem; }
        button { border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s; }
        .primary-btn { background: #007bff; color: white; width: 100%; padding: 12px; }
        .secondary-btn { background: #444; color: white; padding: 8px 15px; font-size: 1rem; }

        /* 遊戲資訊列 */
        .header-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1.2rem; }
        .room-code span { color: #f1c40f; font-weight: bold; }

        /* 顏色選單 (按鈕放大) */
        .color-bar { width: 100%; display: flex; gap: 10px; justify-content: center; align-items: center; background: #1a1a21; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; }
        .color-btn.selected { border-color: white; transform: scale(1.1); }
        .color-btn.taken { opacity: 0.2; cursor: not-allowed; }

        /* 平台表格 (方塊加大) */
        table { width: 100%; border-spacing: 4px; table-layout: fixed; }
        .floor-label { width: 45px; text-align: center; font-weight: bold; font-size: 1.2rem; color: #888; }
        .p-btn { width: 100%; height: 48px; background: #3c3c46; border: none; border-radius: 10px; color: #ffffff !important; font-weight: bold; cursor: pointer; font-size: 1.4rem; padding: 0; }
        
        /* 移除暱稱標籤顯示 */
        .nickname-tag { display: none !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>羅茱助手：真・多人同步</h2>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="password" id="createPwd" placeholder="設定 4 碼密碼" maxlength="4">
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="joinView" class="hidden">
        <input type="text" id="joinId" placeholder="房間號碼">
        <input type="password" id="joinPwd" placeholder="密碼">
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="nicknameView" class="hidden">
        <p>房間：<span id="roomIdDisplay" style="color:#f1c40f">------</span></p>
        <input type="text" id="nicknameInput" placeholder="輸入暱稱 (同步用)" maxlength="6">
        <button class="primary-btn" onclick="setNickname()">開始同步</button>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="header-info">
            <div class="room-code">房間：<span id="activeRoomId">------</span></div>
            <button class="secondary-btn" onclick="clearAllPlatforms()">清空平台</button>
        </div>

        <div class="color-bar">
            <div class="color-btn" style="background:#FF7575" data-color="#FF7575" onclick="selectColor('#FF7575')"></div>
            <div class="color-btn" style="background:#FFC78E" data-color="#FFC78E" onclick="selectColor('#FFC78E')"></div>
            <div class="color-btn" style="background:#66B3FF" data-color="#66B3FF" onclick="selectColor('#66B3FF')"></div>
            <div class="color-btn" style="background:#FF79BC" data-color="#FF79BC" onclick="selectColor('#FF79BC')"></div>
            <button onclick="resetMyColor()" style="background:none; border:1px solid #444; color:#888; border-radius:5px; font-size:0.8rem;">重選</button>
        </div>

        <table>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
