<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超讚RJPQ小工具</title>
    <style>
        /* 1.1倍調整：將基礎字體從 16px 升至 17.6px (約 1.1rem) */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a21; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 5px; box-sizing: border-box; font-size: 1.1rem; overflow: hidden; }
        
        /* 容器寬度放大至約 630px */
        .container { background: #2d2d37; padding: 15px 20px; border-radius: 18px; box-shadow: 0 6px 25px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; }
        
        h2 { margin: 0; color: #fff; font-size: 1.65rem; } /* 1.5 * 1.1 */
        .hint-text { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
        
        #startView, #createView, #joinView, #nicknameView { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 400px; }
        
        /* 左右排版：調整間距 */
        #mainGameView { display: flex; flex-direction: row; gap: 15px; align-items: flex-start; }

        /* 左側主要控制區：放大 1.1 倍 (約 470px) */
        .game-main-content { display: flex; flex-direction: column; align-items: center; width: 470px; }

        input { width: 92%; padding: 10px; border-radius: 10px; border: 1px solid #444; background: #1a1a21; color: #fff; font-size: 1.2rem; }
        button { border-radius: 9px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        .primary-btn { background: #007bff; color: white; width: 100%; padding: 13px; font-size: 1.3rem; }
        .secondary-btn { background: #444; color: white; padding: 7px 11px; font-size: 0.95rem; }
        .exit-btn { background: #6c757d; color: white; padding: 7px 11px; font-size: 0.95rem; }
        
        .promo-btn { color: white; padding: 9px 0; font-size: 1rem; text-decoration: none; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; min-width: 130px; }
        .yt-btn { background: #ff0000; }
        .tw-btn { background: #9146ff; } 

        .header-info { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
        .room-code { font-size: 1.2rem; }
        .room-code span { color: #f1c40f; font-weight: bold; font-size: 1.35rem; }
        .credit-info { font-size: 0.9rem; color: #aaa; background: rgba(0,0,0,0.3); padding: 5px 11px; border-radius: 8px; border: 1px solid #444; text-align: center; flex-grow: 1; }
        .action-group { display: flex; gap: 6px; }

        /* 右側在線名單：放大至約 165px */
        .user-list-sidebar { 
            width: 165px; 
            background: rgba(0,0,0,0.35); 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #444; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .user-list-title { font-size: 1rem; font-weight: bold; color: #aaa; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; text-align: center; }
        #userList { display: flex; flex-direction: column; gap: 8px; }
        .user-badge { font-size: 0.95rem; padding: 7px; border-radius: 8px; color: #fff; font-weight: bold; text-align: center; }

        .picker-bar { width: 100%; display: flex; gap: 10px; justify-content: center; align-items: center; background: #1a1a21; padding: 10px; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        #colorPicker { width: 44px; height: 44px; border: none; background: none; cursor: pointer; padding: 0; }
        .status-tag { font-size: 0.95rem; padding: 4px 10px; border-radius: 7px; background: #444; }

        /* 格子 1.1 倍優化：高度調至 43px，減少間距避免溢出 */
        table { width: 100%; border-spacing: 2.5px; table-layout: fixed; }
        .floor-label { width: 40px; text-align: center; font-weight: bold; font-size: 1.1rem; color: #888; }
        .p-btn { width: 100%; height: 43px; background: #3c3c46; border: none; border-radius: 9px; color: #fff !important; font-weight: bold; cursor: pointer; font-size: 1.45rem; position: relative; overflow: hidden; }
        .user-tag { position: absolute; bottom: 1px; right: 2px; background: rgba(0, 0, 0, 0.75); color: white; font-size: 0.65rem; padding: 1px 3px; border-radius: 2px; pointer-events: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>超讚RJPQ小工具</h2>
    <div class="hint-text">快捷鍵：按數字鍵 1-4 由下往上自動填色</div>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="password" id="createPwd" placeholder="設定 4 碼密碼" maxlength="4">
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>
    <div id="joinView" class="hidden">
        <input type="text" id="joinId" placeholder="房間號碼">
        <input type="password" id="joinPwd" placeholder="密碼">
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>
    <div id="nicknameView" class="hidden">
        <p>房間：<span id="roomIdDisplay" style="color:#f1c40f">------</span></p>
        <input type="text" id="nicknameInput" placeholder="輸入暱稱" maxlength="6">
        <button class="primary-btn" onclick="setNickname()">開始同步</button>
        <button class="secondary-btn" onclick="leaveRoom()">取消</button>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="game-main-content">
            <div class="header-info">
                <div class="info-row">
                    <div class="room-code">房號：<span id="activeRoomId">------</span></div>
                    <a href="https://www.youtube.com/@yulihong22" target="_blank" class="promo-btn yt-btn">咪咪蛋的 YT</a>
                    <a href="https://www.twitch.tv/yulihong22" target="_blank" class="promo-btn tw-btn">咪咪蛋 Twitch</a>
                </div>
                <div class="info-row">
                    <div class="credit-info">公會: MMDxD | 製作: 咖塔</div>
                    <div class="action-group">
                        <button class="secondary-btn" style="background:#28a745;" onclick="copyShareLink()">分享</button>
                        <button class="secondary-btn" onclick="clearAllPlatforms()">清空</button>
                        <button class="exit-btn" onclick="leaveRoom()">離開</button>
                    </div>
                </div>
            </div>

            <div class="picker-bar">
                <span>選色：</span>
                <input type="color" id="colorPicker" value="#00EC00">
                <button id="confirmColorBtn" class="secondary-btn" style="background:#007bff;" onclick="pickCustomColor()">確認</button>
                <button id="resetColorBtn" class="hidden secondary-btn" onclick="resetMyColor()">重選</button>
                <div id="myColorStatus" class="hidden status-tag">已鎖定</div>
            </div>

            <table>
                <tbody id="gridBody"></tbody>
            </table>
        </div>

        <div class="user-list-sidebar">
            <div class="user-list-title">在線隊員</div>
            <div id="userList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="app.js?v=20260321_scale_11"></script>
</body>
</html>
