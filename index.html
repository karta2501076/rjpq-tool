<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅茱助手：真・多人同步版</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 通用按鈕 */
        .btn-green { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-green:hover { background: #27ae60; }
        input[type="text"], input[type="password"] { padding: 10px; background: #333; border: 1px solid #555; border-radius: 5px; color: #fff; width: 60%; margin: 5px; }

        /* 介面視圖 */
        .view-panel { padding: 20px; text-align: center; }
        .room-actions { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }

        /* 分享連結視窗 */
        .share-box { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; }
        .share-box p { font-size: 0.8rem; color: #aaa; margin: 0 0 5px 0; }
        #shareLink { font-family: monospace; font-size: 0.9rem; color: #66B3FF; margin-right: 10px; }

        /* 顏色選單區域 */
        .color-setup { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        .color-setup h3 { margin-top: 0; font-size: 1.1rem; color: #ccc; }
        .color-palette { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .color-btn { width: 45px; height: 45px; border-radius: 5px; cursor: pointer; border: 2px solid rgba(0,0,0,0.2); transition: 0.1s; position: relative; }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn.selected { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .color-btn.taken { opacity: 0.15; cursor: not_allowed; border-color: #f00; } /* 別人選了 -> 變暗不可點 */
        .color-btn.taken::after { content: 'TAKEN'; position: absolute; font-size: 0.5rem; top: 15px; left: 10px; color: #f00; font-weight: bold; transform: rotate(-30deg); }

        /* 遊戲表格 */
        #mainGameView table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid #333; position: relative; padding: 2px; }
        td { height: 60px; } /* 固定高度方便暱稱顯示 */
        .floor-label { font-size: 1.1rem; font-weight: bold; color: #fff; width: 60px; }
        
        /* 平台按鈕 (灰黑色) */
        .p-btn { width: 100%; height: 50px; border: 1px solid #444; background: #333; color: #aaa; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.2rem; transition: 0.1s; display: block; }
        .p-btn:hover { background: #444; }
        
        /* 暱稱標籤 (在格子中間下方) */
        .nickname-tag { position: absolute; font-size: 0.75rem; font-weight: bold; width: 100%; bottom: 3px; left: 0; text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,1); }
        .my-nick { color: #fff !important; text-decoration: underline; } /* 我的暱稱高亮 */

        /* 選取後的按鈕樣式 (由 JS 動態設置背景顏色) */
        .p-btn.taken { opacity: 0.3; cursor: not_allowed; border: none; } /* 被別人佔用 -> 變灰變暗 */

        /* 清空重置按鈕 */
        .clear-btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <h1>羅茱助手：真・多人同步</h1>
    <h2 id="roomIdDisplay" style="color:#66B3FF; margin-top:0;"></h2>

    <div class="container">
        
        <div id="startView" class="view-panel">
            <h3>遊戲形式</h3>
            <div class="room-actions">
                <button class="btn-green" style="background:#e74c3c" onclick="showView('createView')">建立房間</button>
                <button class="btn-green" style="background:#3498db" onclick="showView('joinView')">加入房間</button>
            
        </div>

        <div id="createView" class="view-panel hidden">
            <h3>建立新房間</h3>
            <p>設定房間密碼：</p>
            <input type="password" id="createPwd" placeholder="密碼 (至少4碼)" maxlength="10">
            <br>
            <button class="btn-green" style="background:#e74c3c; margin-top:10px;" onclick="createRoom()">創建房間 (免費)</button>
            <br>
            <button class="util-link" style="color:#aaa; font-size:0.8rem; border:none; background:none; cursor:pointer;" onclick="showView('startView')"><- 返回</button>
        </div>

        <div id="joinView" class="view-panel hidden">
            <h3>加入房間</h3>
            <input type="text" id="joinId" placeholder="輸入房間號碼 (6位數)">
            <br>
            <input type="password" id="joinPwd" placeholder="輸入房間密碼">
            <br>
            <button class="btn-green" style="background:#3498db; margin-top:10px;" onclick="joinRoom()">加入連接</button>
            <br>
            <button class="util-link" style="color:#aaa; font-size:0.8rem; border:none; background:none; cursor:pointer;" onclick="showView('startView')"><- 返回</button>
        </div>

        <div id="nicknameView" class="view-panel hidden">
            <div class="share-box">
                <p>分享此連結直接進房（免填房號/密碼）</p>
                <span id="shareLink"></span>
                <button class="btn-copy" style="background:#555; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer; font-size:0.8rem;" onclick="copyShareLink()">複製連結</button>
            </div>

            <h3>歡迎進入房間，請設定暱稱：</h3>
            <input type="text" id="nicknameInput" placeholder="輸入遊戲暱稱 (完成後不可更改)" maxlength="8">
            <br>
            <button class="btn-green" style="margin-top:10px;" onclick="setNickname()">開始使用</button>
        </div>

        <div id="mainGameView" class="view-panel hidden">
            
            <div class="color-setup">
                <h3>選取您的顏色</h3>
                <div class="color-palette">
                    <div class="color-btn" data-color="#FF7575" style="background:#FF7575;" onclick="selectColor('#FF7575')"></div>
                    <div class="color-btn" data-color="#FFC78E" style="background:#FFC78E;" onclick="selectColor('#FFC78E')"></div>
                    <div class="color-btn" data-color="#66B3FF" style="background:#66B3FF;" onclick="selectColor('#66B3FF')"></div>
                    <div class="color-btn" data-color="#FF79BC" style="background:#FF79BC;" onclick="selectColor('#FF79BC')"></div>
                </div>
                <button class="btn-copy" style="background:#555; color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer; font-size:0.8rem;" onclick="resetMyColor()">重置顏色 (我要更換)</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>樓層</th><th>1</th><th>2</th><th>3</th><th>4</th>
                    </tr>
                </thead>
                <tbody id="gridBody">
                    </tbody>
            </table>

            <div class="clear-btns">
                <button class="btn-green" style="background:#e67e22" onclick="clearAllPlatforms()">完成了，清空平台已填顏色</button>
            </div>

        </div>

        <div style="font-size:0.75rem; color:#555; margin-top:20px;">Copyright © MMDxD karta.</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
