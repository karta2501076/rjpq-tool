<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>超讚RJPQ小工具</title>
    <style>
        /* ====================================================== */
        /* 電腦網頁版基礎樣式 */
        /* ====================================================== */
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background: #1a1a21; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            overflow-x: hidden; 
            overflow-y: auto; 
        }
        
        .container { 
            background: #2d2d37; 
            padding: 18px 22px; 
            border-radius: 16px; 
            box-shadow: 0 6px 25px rgba(0,0,0,0.6); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: all 0.3s ease;
        }
        
        h2 { margin: 0; color: #fff; font-size: 1.5rem; } 

        .home-large-title h2 {
            font-size: 2.3rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .welcome-text {
            color: #fff;
            font-size: 1.2rem;
            margin: 15px 0 5px 0;
            font-weight: bold;
            text-align: center;
        }

        .hint-text { 
            font-size: 0.75rem; 
            color: #888; 
            margin-bottom: 15px; 
            text-align: center; 
            line-height: 1.4;
        }
        
        #startView, #createView, #joinView, #nicknameView { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 380px; }
        
        #mainGameView { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            align-items: flex-start; 
            zoom: 1.01; 
        }
        .game-main-content { display: flex; flex-direction: column; align-items: center; width: 445px; }

        input { width: 90%; padding: 10px; border-radius: 9px; border: 1px solid #444; background: #1a1a21; color: #fff; font-size: 16px; box-sizing: border-box; }
        
        button, .promo-btn { 
            border-radius: 9px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:hover, .promo-btn:hover { top: -2px; }

        .primary-btn { 
            background: #007bff; 
            color: white !important; 
            width: 100%; 
            padding: 12px; 
            font-size: 1.2rem;
            box-shadow: 0 5px 0 #004a99; 
            margin-bottom: 5px;
        }
        .primary-btn:active { top: 4px; box-shadow: 0 1px 0 #004a99; }

        .secondary-btn { background: #444; color: white !important; padding: 6px 12px; font-size: 0.85rem; box-shadow: 0 3px 0 #222; }
        .secondary-btn:active { top: 2px; box-shadow: 0 1px 0 #222; }

        .share-btn { background: #28a745; color: white !important; padding: 6px 12px; font-size: 0.85rem; box-shadow: 0 3px 0 #1e7e34; }
        .share-btn:active { top: 2px; box-shadow: 0 1px 0 #1e7e34; }

        .exit-btn { background: #6c757d; color: white !important; padding: 6px 12px; font-size: 0.85rem; box-shadow: 0 3px 0 #444; }
        .exit-btn:active { top: 2px; box-shadow: 0 1px 0 #444; }
        
        .yt-btn { background: #ff0000; color: white !important; min-width: 120px; padding: 8px 0; font-size: 0.9rem; box-shadow: 0 4px 0 #990000; }
        .tw-btn { background: #9146ff; color: white !important; min-width: 120px; padding: 8px 0; font-size: 0.9rem; box-shadow: 0 4px 0 #5c2db3; }

        .header-info { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
        .room-code span { color: #f1c40f; font-weight: bold; font-size: 1.2rem; }
        .credit-info { font-size: 0.85rem; color: #aaa; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 8px; border: 1px solid #444; text-align: center; flex-grow: 1; }

        .picker-bar { width: 100%; display: flex; gap: 10px; justify-content: center; align-items: center; background: #1a1a21; padding: 10px; border-radius: 11px; margin-bottom: 10px; box-sizing: border-box; }
        #colorPicker { width: 40px; height: 40px; border: none; background: none; cursor: pointer; padding: 0; }

        .user-list-sidebar { width: 150px; background: rgba(0,0,0,0.35); padding: 12px; border-radius: 12px; border: 1px solid #444; box-sizing: border-box; display: flex; flex-direction: column; }
        .user-list-title { font-size: 0.85rem; font-weight: bold; color: #aaa; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; text-align: center; }
        #userList { display: flex; flex-direction: column; gap: 7px; }
        .user-badge { font-size: 0.85rem; padding: 6px; border-radius: 7px; color: #fff; font-weight: bold; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* === 暱稱標籤樣式修正 === */
        .p-btn { 
            width: 100%; 
            height: 40px; 
            background: #3c3c46; 
            color: #fff !important; 
            font-size: 1.35rem; 
            box-shadow: 0 4px 0 #2a2a32; 
            position: relative; /* 關鍵：讓暱稱標籤相對此按鈕定位 */
            overflow: visible; /* 確保標籤不會被切掉 */
        }
        
        .user-tag { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            background: rgba(0, 0, 0, 0.85) !important; /* 強制黑底 */
            color: #fff !important; /* 強制白字 */
            font-size: 0.6rem; 
            padding: 1px 4px; 
            border-radius: 3px; 
            pointer-events: none; 
            z-index: 10;
            line-height: 1;
            font-weight: normal;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .hidden { display: none !important; }

        /* ====================================================== */
        /* 手機版樣式 */
        /* ====================================================== */
        @media (max-width: 768px) {
            body { padding: 5px; align-items: flex-start; } 
            .container { width: 100%; padding: 15px 10px; border-radius: 0; }
            .home-large-title h2 { font-size: 1.8rem; }
            #mainGameView { flex-direction: column; width: 100%; zoom: 1; align-items: center; }
            .game-main-content { width: 100%; }
            
            .user-list-sidebar { width: 100%; margin-top: 15px; padding: 15px; }
            .user-badge { justify-content: center; display: flex; align-items: center; padding: 10px; font-size: 1rem; }
            
            /* 手機版按鈕較大，微調標籤位置 */
            .p-btn { height: 55px; font-size: 1.6rem; } 
            .user-tag { bottom: 4px; right: 4px; font-size: 0.65rem; padding: 2px 5px; }

            .info-row { flex-direction: column; }
            .promo-btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container home-large-title" id="mainContainer">
    <h2>超讚RJPQ小工具</h2>
    
    <div id="welcomeMsg" class="welcome-text">Hi 我是咖塔<br>祝您小工具用的愉快</div>
    <div class="hint-text">快捷鍵: 1~4 可快速填色，0 取消上一層填色<br>(現在手機也能用囉)</div>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="tel" id="createPwd" placeholder="設定 4 碼數字密碼" maxlength="4" pattern="\d*">
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="joinView" class="hidden">
        <input type="tel" id="joinId" placeholder="房間號碼" pattern="\d*">
        <input type="tel" id="joinPwd" placeholder="密碼" maxlength="4" pattern="\d*">
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="nicknameView" class="hidden">
        <p>房間：<span id="roomIdDisplay" style="color:#f1c40f">------</span></p>
        <input type="text" id="nicknameInput" placeholder="輸入暱稱" maxlength="6">
        <button class="primary-btn" onclick="setNickname()">加入</button>
        <button class="secondary-btn" onclick="leaveRoom()">取消</button>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="game-main-content">
            <div class="header-info">
                <div class="info-row">
                    <div class="room-code">房號：<span id="activeRoomId">------</span></div>
                    <a href="https://www.youtube.com/@yulihong22" target="_blank" class="promo-btn yt-btn">咪咪蛋的YT</a>
                    <a href="https://www.twitch.tv/yulihong22" target="_blank" class="promo-btn tw-btn">咪咪蛋的Twitch</a>
                </div>
                <div class="info-row">
                    <div class="credit-info">公會: MMDxD | 製作: 咖塔</div>
                    <div class="action-group" style="display:flex; gap:8px;">
                        <button class="share-btn" onclick="copyShareLink()">分享</button>
                        <button class="secondary-btn" onclick="clearAllPlatforms()">清空</button>
                        <button class="exit-btn" onclick="leaveRoom()">離開</button>
                    </div>
                </div>
            </div>

            <div class="picker-bar">
                <span>選擇顏色：</span>
                <input type="color" id="colorPicker" value="#00EC00">
                <button id="confirmColorBtn" class="secondary-btn" style="background:#007bff; box-shadow: 0 3px 0 #0056b3;" onclick="pickCustomColor()">確認</button>
                <button id="resetColorBtn" class="hidden secondary-btn" onclick="resetMyColor()">重選</button>
                <div id="myColorStatus" class="hidden status-tag">已鎖定</div>
            </div>

            <table><tbody id="gridBody"></tbody></table>
        </div>

        <div class="user-list-sidebar">
            <div class="user-list-title">在線隊員</div>
            <div id="userList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
<script>
    const originalShowView = showView;
    showView = (viewId) => {
        originalShowView(viewId);
        const container = document.getElementById('mainContainer');
        const welcome = document.getElementById('welcomeMsg');
        
        if (viewId === 'mainGameView') {
            container.classList.remove('home-large-title');
            welcome.classList.add('hidden');
        } else {
            container.classList.add('home-large-title');
            welcome.classList.remove('hidden');
        }
    };
</script>
</body>
</html>
