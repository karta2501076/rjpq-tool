<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅茱助手：真・多人同步</title>
    <style>
        /* 基礎暗色風格設定 (優化：垂直佈局，置中) */
        body { font-family: sans-serif; background: #1a1a21; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 0; overflow: hidden; }
        .container { background: #2d2d37; padding: 10px; border-radius: 12px; width: 340px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
        h2 { margin: 5px 0 10px 0; color: #fff; font-size: 1.2rem; }
        
        /* 1. 開始畫面 (優化：垂直排列，縮小間隔) */
        #startView { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        /* 2. 建立/加入畫面 (優化：垂直排列，縮小間隔) */
        #createView, #joinView { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        /* 3. 暱稱畫面 (優化：垂直排列，縮小間隔) */
        #nicknameView { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        /* 4. 遊戲主畫面 (優化：固定寬度) */
        #mainGameView { width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* 輸入框與基礎按鈕 (優化：縮小尺寸) */
        input { width: 90%; padding: 6px; border-radius: 6px; border: 1px solid #444; background: #1a1a21; color: #fff; font-size: 0.9rem; }
        button { border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; white-space: nowrap; }
        .primary-btn { background: #007bff; color: white; width: 100%; padding: 8px; margin: 0; }
        .primary-btn:hover { background: #0056b3; }
        .secondary-btn { background: #444; color: white; padding: 4px 8px; margin: 0; }

        /* 遊戲上方資訊列 (優化：調整間距) */
        .header-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8rem; }
        .room-code span { color: #f1c40f; font-weight: bold; }
        .share-btn { padding: 4px 8px; font-size: 0.7rem; }

        /* 顏色選單 (優化：縮小按鈕尺寸) */
        .color-bar { width: 100%; display: flex; gap: 6px; justify-content: center; align-items: center; background: #1a1a21; padding: 6px; border-radius: 8px; margin-bottom: 6px; }
        .color-btn { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .color-btn.selected { border-color: white; transform: scale(1.05); }
        .color-btn.taken { opacity: 0.15; cursor: not-allowed; }
        .reset-btn { background: transparent; color: #888; border: 1px solid #444; padding: 2px 6px; font-size: 0.7rem; }

        /* 表格樣式 (優化：縮小框框與間隔) */
        table { width: 100%; border-spacing: 2px; table-layout: fixed; }
        .floor-label { width: 30px; text-align: center; font-weight: bold; font-size: 0.8rem; color: #888; }
        .p-btn { width: 100%; height: 26px; background: #3c3c46; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; position: relative; font-size: 0.8rem; padding: 0; margin: 0; }
        .p-btn:hover { background: #4e4e5a; }
        
        /* 玩家暱稱標籤 (優化：對齊修正) */
        .nickname-tag { position: absolute; bottom: 0px; width: 100%; left: 0; text-align: center; font-size: 0.6rem; font-weight: normal; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .hidden { display: none !important; }
        
        /* 暱稱畫面專用連結 */
        .share-url { font-size: 0.7rem; color: #888; word-break: break-all; margin-top: 5px; text-align: center; width: 90%; }
    </style>
</head>
<body>

<div class="container">
    <h2>羅茱助手：真・多人同步</h2>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="password" id="createPwd" placeholder="設定房間密碼 (4碼)" maxlength="4">
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="joinView" class="hidden">
        <input type="text" id="joinId" placeholder="輸入房間號碼">
        <input type="password" id="joinPwd" placeholder="輸入密碼">
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="nicknameView" class="hidden">
        <p>房間號碼：<span id="roomIdDisplay" style="color: #f1c40f; font-weight: bold;">------</span></p>
        <input type="text" id="nicknameInput" placeholder="你的暱稱" maxlength="6">
        <button class="primary-btn" onclick="setNickname()">開始同步</button>
        <div class="share-url">分享連結：<br><span id="shareLink"></span></div>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="header-info">
            <div class="room-code">房間：<span id="activeRoomId">------</span></div>
            <div style="display: flex; gap: 4px; align-items: center;">
                <button class="share-btn secondary-btn" onclick="copyShareLink()">分享連結</button>
                <button class="clear-btn secondary-btn" onclick="clearAllPlatforms()">清空平台</button>
            </div>
        </div>

        <div class="color-bar">
            <div class="color-btn" style="background:#FF7575" data-color="#FF7575" onclick="selectColor('#FF7575')"></div>
            <div class="color-btn" style="background:#FFC78E" data-color="#FFC78E" onclick="selectColor('#FFC78E')"></div>
            <div class="color-btn" style="background:#66B3FF" data-color="#66B3FF" onclick="selectColor('#66B3FF')"></div>
            <div class="color-btn" style="background:#FF79BC" data-color="#FF79BC" onclick="selectColor('#FF79BC')"></div>
            <button class="reset-btn" onclick="resetMyColor()">重選</button>
        </div>

        <table>
            <tbody id="gridBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
